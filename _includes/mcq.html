<style>
.quiz-block {
  margin: 2rem 0;
  padding: 1.25rem 1.5rem;
  border: 1px solid #d0d0d0;
  border-radius: 8px;
  background: #f8f8f8;
  color: #1a1a1a;
}
.quiz-question {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 1rem;
  line-height: 1.5;
  color: #1a1a1a;
}
.quiz-options {
  list-style: none !important;
  padding: 0 !important;
  margin: 0 !important;
}
.quiz-options li {
  list-style: none !important;
  margin: 0.4rem 0 !important;
  padding: 0 !important;
}
.quiz-options li::before { display: none !important; }
.quiz-option-label {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  cursor: pointer;
  background: #fff;
  color: #1a1a1a;
  font-size: 1rem;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.quiz-option-label:hover {
  border-color: #5050d0;
  background: #f0f0ff;
}
.quiz-option-label input[type=radio] { display: none; }
.quiz-radio-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid #aaa;
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
  box-sizing: border-box;
}
.quiz-option-label input[type=radio]:checked ~ .quiz-radio-dot {
  border-color: #5050d0;
  background: #5050d0;
  box-shadow: inset 0 0 0 3px #fff;
}
.quiz-option-label input[type=radio]:checked ~ .quiz-option-text {
  color: #3030a0;
  font-weight: 300;
}
.quiz-submit {
  margin-top: 1rem;
  padding: 0.45rem 1.2rem;
  background: #5050d0;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.quiz-submit:hover { background: #3838b0; }
.quiz-score-btn {
  margin-top: 1.5rem;
  padding: 0.5rem 1.4rem;
  background: #fff;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.15s;
  display: block;
}
.quiz-score-btn:hover { background: #f0f0f0; }
.quiz-feedback {
  margin-top: 0.6rem;
  padding: 0.5rem 0.9rem;
  border-radius: 6px;
  font-size: 0.88rem;
}
.quiz-feedback.correct {
  background: #edfaed;
  color: #1a6b1a;
  border: 1px solid #80c880;
}
.quiz-feedback.incorrect {
  background: #faeaea;
  color: #8b1a1a;
  border: 1px solid #e08080;
}
.quiz-score-display {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  font-weight: 600;
  background: #f0f0ff;
  border: 1px solid #5050d0;
  color: #3030a0;
}
</style>

<script>
const _quizData = {};

// Fisher-Yates shuffle
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Shuffle options and update the answer index to match new position
function shuffleOptions(q) {
  const correctText = q.options[q.answer];
  const shuffled = shuffle(q.options);
  return {
    ...q,
    options: shuffled,
    answer: shuffled.indexOf(correctText)
  };
}

function renderQuiz(containerId, originalQuestions) {
  const container = document.getElementById(containerId);
  if (!container) return;

  // Shuffle questions and each question's options
  const questions = shuffle(originalQuestions).map(shuffleOptions);
  _quizData[containerId] = questions;

  questions.forEach((q, qi) => {
    const block = document.createElement('div');
    block.className = 'quiz-block';

    const questionEl = document.createElement('div');
    questionEl.className = 'quiz-question';
    questionEl.innerHTML = `${qi + 1}. ${q.q}`;
    block.appendChild(questionEl);

    const ul = document.createElement('ul');
    ul.className = 'quiz-options';
    q.options.forEach((opt, oi) => {
      const li = document.createElement('li');
      const label = document.createElement('label');
      label.className = 'quiz-option-label';
      const input = document.createElement('input');
      input.type = 'radio';
      input.name = `q${containerId}-${qi}`;
      input.value = oi;
      const dot = document.createElement('span');
      dot.className = 'quiz-radio-dot';
      const text = document.createElement('span');
      text.className = 'quiz-option-text';
      text.textContent = opt;
      label.appendChild(input);
      label.appendChild(dot);
      label.appendChild(text);
      li.appendChild(label);
      ul.appendChild(li);
    });
    block.appendChild(ul);

    const btn = document.createElement('button');
    btn.className = 'quiz-submit';
    btn.textContent = 'Check';
    btn.addEventListener('click', () => checkAnswer(containerId, qi));
    block.appendChild(btn);

    const feedback = document.createElement('div');
    feedback.className = 'quiz-feedback';
    feedback.id = `feedback-${containerId}-${qi}`;
    feedback.style.display = 'none';
    block.appendChild(feedback);

    container.appendChild(block);
  });

  const scoreBtn = document.createElement('button');
  scoreBtn.className = 'quiz-score-btn';
  scoreBtn.textContent = 'Show Score';
  scoreBtn.addEventListener('click', () => showScore(containerId));
  container.appendChild(scoreBtn);

  const scoreDiv = document.createElement('div');
  scoreDiv.className = 'quiz-score-display';
  scoreDiv.id = `score-${containerId}`;
  scoreDiv.style.display = 'none';
  container.appendChild(scoreDiv);
}

function checkAnswer(containerId, qi) {
  const q = _quizData[containerId][qi];
  const selected = document.querySelector(`input[name="q${containerId}-${qi}"]:checked`);
  const feedback = document.getElementById(`feedback-${containerId}-${qi}`);
  if (!selected) {
    feedback.style.display = 'block';
    feedback.className = 'quiz-feedback';
    feedback.textContent = 'Please select an answer.';
    return;
  }
  const isCorrect = parseInt(selected.value) === q.answer;
  feedback.style.display = 'block';
  feedback.className = 'quiz-feedback ' + (isCorrect ? 'correct' : 'incorrect');
  feedback.textContent = isCorrect ? '✓ Correct!' : `✗ Incorrect. ${q.explanation || ''}`;
}

function showScore(containerId) {
  const questions = _quizData[containerId];
  let correct = 0;
  questions.forEach((q, qi) => {
    const selected = document.querySelector(`input[name="q${containerId}-${qi}"]:checked`);
    if (selected && parseInt(selected.value) === q.answer) correct++;
  });
  const scoreDiv = document.getElementById(`score-${containerId}`);
  scoreDiv.style.display = 'block';
  scoreDiv.textContent = `Score: ${correct} / ${questions.length}`;
}
</script>
