<style>
.quiz-block {
  margin: 2rem 0;
  padding: 1.25rem 1.5rem;
  border: 1px solid #d0d0d0;
  border-radius: 8px;
  background: #f8f8f8;
  color: #1a1a1a;
}
.quiz-question {
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 1rem;
  line-height: 1.5;
  color: #1a1a1a;
}
.quiz-options {
  list-style: none !important;
  padding: 0 !important;
  margin: 0 !important;
}
.quiz-options li {
  list-style: none !important;
  margin: 0.4rem 0 !important;
  padding: 0 !important;
}
.quiz-options li::before { display: none !important; }
.quiz-option-label {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.6rem 1rem;
  border: 1px solid #ccc;
  border-radius: 6px;
  cursor: pointer;
  background: #fff;
  color: #1a1a1a;
  font-size: 1rem;
  transition: border-color 0.15s, background 0.15s;
  user-select: none;
}
.quiz-option-label:hover {
  border-color: #5050d0;
  background: #f0f0ff;
}
.quiz-option-label input[type=radio],
.quiz-option-label input[type=checkbox] { display: none; }

/* Radio dot — circle for single-select */
.quiz-radio-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  border: 2px solid #aaa;
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
  box-sizing: border-box;
}
.quiz-option-label input[type=radio]:checked ~ .quiz-radio-dot {
  border-color: #5050d0;
  background: #5050d0;
  box-shadow: inset 0 0 0 3px #fff;
}
.quiz-option-label input[type=radio]:checked ~ .quiz-option-text {
  color: #3030a0;
  font-weight: 500;
}

/* Checkbox square — for multi-select */
.quiz-check-box {
  width: 16px; height: 16px;
  border-radius: 3px;
  border: 2px solid #aaa;
  flex-shrink: 0;
  transition: border-color 0.15s, background 0.15s;
  box-sizing: border-box;
  display: flex; align-items: center; justify-content: center;
}
.quiz-option-label input[type=checkbox]:checked ~ .quiz-check-box {
  border-color: #5050d0;
  background: #5050d0;
}
.quiz-option-label input[type=checkbox]:checked ~ .quiz-check-box::after {
  content: '';
  width: 4px; height: 8px;
  border: 2px solid #fff;
  border-top: none; border-left: none;
  transform: rotate(45deg) translate(-1px, -1px);
  display: block;
}
.quiz-option-label input[type=checkbox]:checked ~ .quiz-option-text {
  color: #3030a0;
  font-weight: 500;
}

/* Multi-select hint tag */
.quiz-multi-hint {
  font-size: 0.78rem;
  color: #777;
  margin-bottom: 0.75rem;
  font-style: italic;
}
.quiz-submit {

  padding: 0.45rem 1.2rem;
  background: #5050d0;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.quiz-submit:hover { background: #3838b0; }
.quiz-score-btn {
  margin-top: 1.5rem;
  padding: 0.5rem 1.4rem;
  background: #fff;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.15s;
  display: block;
}
.quiz-score-btn:hover { background: #f0f0f0; }
.quiz-feedback {
  margin-top: 0.6rem;
  padding: 0.5rem 0.9rem;

  font-size: 0.88rem;
}

.quiz-score-display {
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  font-weight: 600;

  border: 1px solid #5050d0;
  color: #3030a0;
